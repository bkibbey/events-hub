<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>Raleigh Weekend Events Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);--text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);--text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);--text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-border:#d4d1ca;--color-text:#28251d;--color-text-muted:#7a7974;--color-primary:#01696f;--color-primary-soft:#cedcd8;
      --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 4px 12px rgba(0,0,0,.08);
      --transition:160ms cubic-bezier(0.16,1,0.3,1);
    }
    [data-theme="dark"] {
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#22211f;--color-border:#393836;--color-text:#cdccca;--color-text-muted:#797876;--color-primary:#4f98a3;--color-primary-soft:#313b3b;
      --shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;text-size-adjust:none;scroll-behavior:smooth;scroll-padding-top:var(--space-16)}
    body{font-family:'Work Sans',system-ui,sans-serif;font-size:var(--text-base);line-height:1.6;color:var(--color-text);background:var(--color-bg);min-height:100vh}
    img{max-width:100%;display:block}
    button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
    a{color:inherit;text-decoration:none}
    .page{max-width:1200px;margin:0 auto;padding:var(--space-4) var(--space-4) var(--space-10)}
    header{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-4)}
    .logo{display:flex;align-items:center;gap:var(--space-3)}
    .logo-mark{width:36px;height:36px;border-radius:40% 60% 50% 50%;background:radial-gradient(circle at 30% 20%,#fff,var(--color-primary-soft));border:1px solid rgba(0,0,0,.04);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;color:var(--color-primary);font-weight:700;font-size:.8rem}
    .logo-text h1{font-size:var(--text-lg);font-weight:600;letter-spacing:.02em}
    .logo-text p{font-size:var(--text-xs);color:var(--color-text-muted)}
    .theme-toggle{border-radius:var(--radius-full);padding:.25rem .6rem;border:1px solid var(--color-border);background:var(--color-surface);display:inline-flex;align-items:center;gap:.35rem;box-shadow:var(--shadow-sm);transition:background var(--transition),transform var(--transition),box-shadow var(--transition)}
    .theme-toggle:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}

    /* Filters */
    .filters{position:sticky;top:0;z-index:10;padding:var(--space-3) 0;margin:0;background:linear-gradient(to bottom,var(--color-bg) 80%,transparent);backdrop-filter:blur(8px)}
    .filters-inner{border-radius:var(--radius-lg);background:var(--color-surface);box-shadow:var(--shadow-sm);border:1px solid var(--color-border);display:grid;gap:0}
    .filters-row{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;padding:var(--space-3);border-bottom:1px solid rgba(0,0,0,.04)}
    .filters-row:last-child{border-bottom:none}
    .filters-row .row-label{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em;margin-right:var(--space-2);white-space:nowrap}
    .filters-row .field{flex:1 1 200px;min-width:180px;max-width:320px;position:relative;margin-left:auto}
    .filters-row .field input{width:100%;padding:.4rem .75rem .4rem 1.9rem;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface-2);font-size:var(--text-xs);color:var(--color-text);outline:none;transition:border-color var(--transition),box-shadow var(--transition),background var(--transition)}
    .filters-row .field input::placeholder{color:var(--color-text-muted)}
    .filters-row .field input:focus{border-color:var(--color-primary);box-shadow:0 0 0 1px rgba(1,105,111,.2);background:var(--color-surface)}
    .field-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--color-text-muted);pointer-events:none}
    .pill-group{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;flex:1 1 auto}
    .pill{padding:.25rem .75rem;border-radius:var(--radius-full);border:1px solid rgba(0,0,0,.06);background:var(--color-surface-2);font-size:var(--text-xs);color:var(--color-text-muted);display:inline-flex;align-items:center;gap:.25rem;transition:background var(--transition),color var(--transition),border-color var(--transition),transform var(--transition),box-shadow var(--transition);white-space:nowrap;cursor:pointer}
    .pill:hover{background:var(--color-surface-offset);color:var(--color-text)}
    .pill.is-active{background:var(--color-primary-soft);border-color:var(--color-primary);color:var(--color-primary);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
    .pill .count{opacity:.6;font-size:.65rem;margin-left:.15rem}
    .result-meta{font-size:var(--text-xs);color:var(--color-text-muted);margin-left:auto;white-space:nowrap}

    /* Masonry: CSS columns approach (broad browser support) */
    .events-grid{column-count:1;column-gap:var(--space-3);margin-top:var(--space-4)}
    @media(min-width:640px){.events-grid{column-count:2}}
    @media(min-width:1000px){.events-grid{column-count:3}}
    .event-card{break-inside:avoid;page-break-inside:avoid;-webkit-column-break-inside:avoid;display:inline-block;width:100%;margin:0 0 var(--space-3) 0;position:relative;border-radius:var(--radius-lg);border:1px solid var(--color-border);background:var(--color-surface);box-shadow:var(--shadow-sm);padding:var(--space-3);transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition),background var(--transition)}
    .event-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(1,105,111,.35);background:var(--color-surface-2)}
    .event-card.highlighted{outline:2px solid var(--color-primary);outline-offset:2px}

    .event-select{position:absolute;top:.5rem;right:.5rem;display:flex;align-items:center;gap:.25rem;font-size:var(--text-xs);color:var(--color-text-muted);z-index:2}
    .event-select input[type=checkbox]{width:16px;height:16px;accent-color:var(--color-primary);cursor:pointer}

    /* Card section: tag pills on top */
    .card-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.6rem;padding-right:2rem}
    .card-tag{padding:.18rem .55rem;border-radius:var(--radius-full);background:var(--color-surface-offset);font-size:.68rem;color:var(--color-text-muted);cursor:pointer;border:1px solid transparent;transition:background var(--transition),color var(--transition),border-color var(--transition)}
    .card-tag:hover{background:var(--color-primary-soft);color:var(--color-primary);border-color:rgba(1,105,111,.2)}
    .card-tag.is-active{background:var(--color-primary-soft);color:var(--color-primary);border-color:var(--color-primary)}

    .event-day{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.15rem}
    .event-title{font-size:var(--text-base);font-weight:600;line-height:1.3;margin-bottom:.25rem}
    .event-tagline{font-size:var(--text-xs);color:var(--color-text-muted);font-style:italic;margin-bottom:.4rem}
    .event-venue{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:.25rem}
    .event-meta{display:flex;flex-direction:column;gap:.15rem;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:.4rem}

    .badge-row{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.5rem}
    .badge{padding:.15rem .5rem;border-radius:var(--radius-full);border:1px solid transparent;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;font-weight:500;white-space:nowrap}
    .badge-free{background:#e3f6e1;color:#23592a;border-color:rgba(34,139,34,.25)}
    .badge-paid{background:#fff4e0;color:#8c4a00;border-color:rgba(220,140,20,.35)}
    [data-theme=dark] .badge-free{background:#294231;color:#b9f6c0;border-color:rgba(185,246,192,.25)}
    [data-theme=dark] .badge-paid{background:#493825;color:#ffd9a2;border-color:rgba(255,217,162,.35)}
    .badge-multiday{background:var(--color-surface-offset);color:var(--color-text);border-color:rgba(0,0,0,.06)}

    .event-desc{font-size:var(--text-sm);color:var(--color-text);margin-bottom:.6rem}

    /* Link buttons at bottom */
    .event-links{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:auto;padding-top:.5rem;border-top:1px dashed var(--color-border)}
    .link-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .65rem;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface-2);color:var(--color-text);font-size:.7rem;font-weight:500;transition:background var(--transition),color var(--transition),border-color var(--transition),transform var(--transition)}
    .link-btn:hover{background:var(--color-primary-soft);color:var(--color-primary);border-color:var(--color-primary);transform:translateY(-1px)}
    .link-btn.link-tickets{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
    .link-btn.link-tickets:hover{background:#0c4e54;color:#fff}

    .share-bar{position:sticky;bottom:.75rem;margin-top:var(--space-3);display:flex;justify-content:center;pointer-events:none}
    .share-inner{pointer-events:auto;background:var(--color-surface);border-radius:var(--radius-full);border:1px solid var(--color-border);box-shadow:var(--shadow-md);padding:.4rem .75rem;display:flex;align-items:center;gap:.6rem;font-size:var(--text-xs);color:var(--color-text-muted)}
    .btn-primary{padding:.35rem .9rem;border-radius:var(--radius-full);background:var(--color-primary);color:#fff;font-size:var(--text-xs);font-weight:500;display:inline-flex;align-items:center;gap:.25rem;transition:background var(--transition),transform var(--transition),box-shadow var(--transition)}
    .btn-primary:hover{background:#0c4e54;transform:translateY(-1px);box-shadow:var(--shadow-md)}
    .btn-ghost{padding:.35rem .9rem;border-radius:var(--radius-full);border:1px solid var(--color-border);font-size:var(--text-xs);color:var(--color-text-muted);transition:background var(--transition),transform var(--transition)}
    .btn-ghost:hover{background:var(--color-surface-offset);transform:translateY(-1px)}
    .share-toast{position:fixed;inset-inline:0;bottom:.5rem;display:flex;justify-content:center;pointer-events:none;z-index:40;opacity:0;transition:opacity .3s}
    .share-toast.visible{opacity:1}
    .share-toast-inner{background:var(--color-primary);color:#fff;padding:.35rem .85rem;border-radius:var(--radius-full);font-size:var(--text-xs);box-shadow:var(--shadow-md)}
    .empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted)}
    .empty-state h3{color:var(--color-text);margin-bottom:var(--space-2)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition-duration:.01ms!important;animation-duration:.01ms!important}}
  </style>
</head>
<body>
<div class="page">
  <a href="#main" class="sr-only">Skip to events</a>
  <header>
    <div class="logo" aria-label="Raleigh Weekend Events Hub">
      <div class="logo-mark">919</div>
      <div class="logo-text">
        <h1>Raleigh Weekend Events</h1>
        <p id="weekLabel">Loading…</p>
      </div>
    </div>
    <div style="display:flex;gap:var(--space-2);align-items:center">
      <button id="clearSelBtn" class="btn-ghost" type="button" style="display:none">Clear selection</button>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span id="themeIcon">☀️</span>
        <span class="theme-label" style="font-size:var(--text-xs);color:var(--color-text-muted)">Light</span>
      </button>
    </div>
  </header>

  <main id="main">
    <section class="filters" aria-label="Filters">
      <div class="filters-inner">
        <!-- Row 1: Day pills + Free toggle + Search -->
        <div class="filters-row">
          <span class="row-label">When</span>
          <div class="pill-group" id="dayPills" aria-label="Filter by day">
            <button class="pill is-active" data-day="all" type="button">All days</button>
            <button class="pill" data-day="Friday" type="button">Friday</button>
            <button class="pill" data-day="Saturday" type="button">Saturday</button>
            <button class="pill" data-day="Sunday" type="button">Sunday</button>
            <button class="pill" id="freeToggle" type="button">⊙ Free only</button>
          </div>
          <div class="field">
            <span class="field-icon">🔍</span>
            <input id="searchInput" type="search" placeholder="Search events, venues…" aria-label="Search events" />
          </div>
        </div>
        <!-- Row 2: Tag pills -->
        <div class="filters-row">
          <span class="row-label">Tags</span>
          <div class="pill-group" id="tagPills" aria-label="Filter by tag"></div>
          <div class="result-meta" id="resultMeta">Loading…</div>
        </div>
      </div>
    </section>

    <section aria-label="Events">
      <div id="eventsGrid" class="events-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none">
        <h3>No events match</h3>
        <p>Try removing a tag or clearing filters.</p>
      </div>
    </section>

    <div class="share-bar" aria-live="polite">
      <div class="share-inner" id="shareBar" style="display:none">
        <span id="shareCount"><strong>0</strong> selected</span>
        <button class="btn-primary" id="shareBtn" type="button">📋 Copy shareable link</button>
      </div>
    </div>
    <div class="share-toast" id="shareToast">
      <div class="share-toast-inner">✓ Link copied — paste it in a text or email!</div>
    </div>
  </main>
</div>

<script>
// Theme
(function(){
  const root=document.documentElement,toggle=document.getElementById('themeToggle'),icon=document.getElementById('themeIcon'),label=toggle.querySelector('.theme-label');
  let cur=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  function setTheme(m){root.setAttribute('data-theme',m);icon.textContent=m==='dark'?'🌙':'☀️';label.textContent=m==='dark'?'Dark':'Light';}
  setTheme(cur);
  toggle.addEventListener('click',()=>{cur=cur==='dark'?'light':'dark';setTheme(cur);});
})();

const state={allEvents:[],filtered:[],selectedIds:new Set(),activeDay:'all',freeOnly:false,activeTags:new Set(),query:'',week:null};
const $ = id => document.getElementById(id);

function getUrlParams(){
  const p=new URLSearchParams(window.location.search);
  const sel=p.get('selected');
  const ids=new Set();
  if(sel)sel.split(',').forEach(x=>{const n=parseInt(x,10);if(!isNaN(n))ids.add(n);});
  return{selectedIds:ids,weekParam:p.get('week')};
}

function buildTagPills(events){
  const counts=new Map();
  events.forEach(e=>(e.tags||[]).forEach(t=>counts.set(t,(counts.get(t)||0)+1)));
  const sorted=Array.from(counts.entries()).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
  const c=$('tagPills');c.innerHTML='';
  sorted.forEach(([tag,count])=>{
    const btn=document.createElement('button');
    btn.type='button';btn.className='pill';btn.dataset.tag=tag;
    btn.innerHTML=`${tag}<span class="count">${count}</span>`;
    btn.addEventListener('click',()=>toggleTag(tag));
    c.appendChild(btn);
  });
}

function toggleTag(tag){
  if(state.activeTags.has(tag))state.activeTags.delete(tag);
  else state.activeTags.add(tag);
  syncTagPillState();
  applyFilters();
}

function syncTagPillState(){
  // Sync header pills
  document.querySelectorAll('#tagPills .pill').forEach(b=>{
    b.classList.toggle('is-active',state.activeTags.has(b.dataset.tag));
  });
  // Sync in-card chips
  document.querySelectorAll('.card-tag').forEach(c=>{
    c.classList.toggle('is-active',state.activeTags.has(c.dataset.tag));
  });
}

function applyFilters(){
  const{activeDay:day,freeOnly,activeTags:tags,query:q,selectedIds}=state;
  let out=state.allEvents.filter(ev=>{
    if(day!=='all'&&!(ev.days||[]).includes(day))return false;
    if(freeOnly&&!ev.free)return false;
    // AND logic: event must include EVERY active tag
    if(tags.size>0){
      const et=new Set(ev.tags||[]);
      for(const t of tags){if(!et.has(t))return false;}
    }
    if(q){const txt=[ev.name||'',ev.venue||'',ev.city||'',(ev.tags||[]).join(' '),ev.description||''].join(' ').toLowerCase();if(!txt.includes(q))return false;}
    return true;
  });
  out.sort((a,b)=>{
    const as=selectedIds.has(a.id)?0:1,bs=selectedIds.has(b.id)?0:1;
    if(as!==bs)return as-bs;
    return(a.name||'').localeCompare(b.name||'');
  });
  state.filtered=out;
  renderEvents();
}

function renderEvents(){
  const grid=$('eventsGrid');
  const empty=$('emptyState');
  grid.innerHTML='';
  if(!state.filtered.length){
    grid.style.display='none';
    empty.style.display='flex';
  } else {
    grid.style.display='';
    empty.style.display='none';
    state.filtered.forEach(ev=>grid.appendChild(makeCard(ev)));
  }
  $('resultMeta').textContent=`${state.filtered.length} of ${state.allEvents.length} events`;
  const n=state.selectedIds.size;
  $('shareBar').style.display=n>0?'flex':'none';
  $('clearSelBtn').style.display=n>0?'':'none';
  if(n>0)$('shareCount').innerHTML=`<strong>${n}</strong> selected`;
  syncTagPillState();
}

function el(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}

function makeCard(ev){
  const card=document.createElement('article');
  card.className='event-card'+(state.selectedIds.has(ev.id)?' highlighted':'');
  card.dataset.id=ev.id;

  // Selection checkbox (top-right)
  const sel=document.createElement('label');
  sel.className='event-select';
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=state.selectedIds.has(ev.id);cb.setAttribute('aria-label','Select '+ev.name);
  cb.addEventListener('change',()=>{
    if(cb.checked)state.selectedIds.add(ev.id);else state.selectedIds.delete(ev.id);
    applyFilters();
  });
  sel.appendChild(cb);card.appendChild(sel);

  // 1. TAG PILLS at top of card
  if((ev.tags||[]).length){
    const tagsEl=el('div','card-tags');
    ev.tags.forEach(t=>{
      const chip=el('button','card-tag',t);
      chip.type='button';
      chip.dataset.tag=t;
      if(state.activeTags.has(t))chip.classList.add('is-active');
      chip.addEventListener('click',(e)=>{e.stopPropagation();toggleTag(t);});
      tagsEl.appendChild(chip);
    });
    card.appendChild(tagsEl);
  }

  // 2. Day, title, tagline, venue
  card.appendChild(el('div','event-day',(ev.days||[]).join(' · ')));
  card.appendChild(el('div','event-title',ev.name));
  if(ev.tagline)card.appendChild(el('div','event-tagline',ev.tagline));
  card.appendChild(el('div','event-venue',[ev.venue,ev.city].filter(Boolean).join(' · ')));

  // 3. Meta (schedule + address)
  const meta=el('div','event-meta');
  const scheduleParts=[];
  if(ev.scheduleNote)scheduleParts.push(ev.scheduleNote);
  else if(ev.startTime||ev.endTime)scheduleParts.push([ev.startTime,ev.endTime].filter(Boolean).join(' – '));
  scheduleParts.forEach(s=>meta.appendChild(el('div','',s)));
  if(ev.address)meta.appendChild(el('div','',ev.address));
  if(meta.children.length)card.appendChild(meta);

  // 4. Free / Multi-day badges
  const badges=el('div','badge-row');
  badges.appendChild(el('span','badge '+(ev.free?'badge-free':'badge-paid'),ev.free?'Free':'Ticketed'));
  if(ev.multiDay)badges.appendChild(el('span','badge badge-multiday','Multi-day'));
  card.appendChild(badges);

  // 5. Description
  if(ev.description)card.appendChild(el('p','event-desc',ev.description));

  // 6. LINK BUTTONS at bottom
  const links=el('div','event-links');
  function addLink(label,url,extraCls){
    if(!url)return;
    const a=document.createElement('a');
    a.href=url;a.target='_blank';a.rel='noopener noreferrer';
    a.className='link-btn'+(extraCls?' '+extraCls:'');
    a.innerHTML=label;
    links.appendChild(a);
  }
  if(!ev.free&&ev.ticketUrl)addLink('🎟 Tickets',ev.ticketUrl,'link-tickets');
  addLink('🌐 Website',ev.website);
  addLink('📘 Facebook',ev.facebook);
  addLink('📷 Instagram',ev.instagram);
  if(links.children.length)card.appendChild(links);

  return card;
}

// Share
$('shareBtn').addEventListener('click',()=>{
  if(!state.selectedIds.size)return;
  const ids=Array.from(state.selectedIds).sort((a,b)=>a-b);
  const p=new URLSearchParams();
  p.set('selected',ids.join(','));
  if(state.week)p.set('week',state.week);
  const url=`${location.origin}${location.pathname}?${p.toString()}`;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(showToast).catch(()=>window.prompt('Copy this link:',url));
  } else {window.prompt('Copy this link:',url);}
});

$('clearSelBtn').addEventListener('click',()=>{state.selectedIds.clear();applyFilters();});

// Day pills
document.getElementById('dayPills').addEventListener('click',e=>{
  const btn=e.target.closest('[data-day]');if(!btn)return;
  document.querySelectorAll('[data-day]').forEach(b=>b.classList.remove('is-active'));
  btn.classList.add('is-active');state.activeDay=btn.dataset.day;applyFilters();
});

// Free toggle
$('freeToggle').addEventListener('click',function(e){
  e.stopPropagation();
  state.freeOnly=!state.freeOnly;this.classList.toggle('is-active',state.freeOnly);applyFilters();
});

// Search
$('searchInput').addEventListener('input',function(){state.query=this.value.toLowerCase().trim();applyFilters();});

function showToast(){
  const t=$('shareToast');t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),2500);
}

// Load data — try a few sensible locations
async function loadEvents(){
  const candidates=['data/events.json','events.json','./data/events.json'];
  for(const url of candidates){
    try{
      const r=await fetch(url,{cache:'no-cache'});
      if(r.ok)return await r.json();
    }catch(e){/* try next */}
  }
  throw new Error('No events.json found');
}

loadEvents()
  .then(data=>{
    state.allEvents=data.events||[];
    state.week=data.week||null;
    if(data.week){
      const d=new Date(data.week);
      $('weekLabel').textContent='Weekend of '+d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    }
    buildTagPills(state.allEvents);
    const{selectedIds}=getUrlParams();
    state.selectedIds=selectedIds;
    applyFilters();
    if(selectedIds.size>0){
      setTimeout(()=>{
        const first=document.querySelector('.event-card.highlighted');
        if(first)first.scrollIntoView({behavior:'smooth',block:'center'});
      },300);
    }
  })
  .catch(err=>{$('resultMeta').textContent='Could not load events.json';console.error(err);});
</script>
</body>
</html>
